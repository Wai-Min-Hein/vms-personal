services:
  mediamtx-simulator:
    image: bluenviron/mediamtx:1.19.1
    restart: unless-stopped
    volumes:
      - ./infra/mediamtx/simulator.yml:/mediamtx.yml:ro
    ports:
      - "18554:18554"
      - "11935:11935"
      - "18888:18888"
      - "19997:19997"

  simulator-vcam1:
    build:
      context: .
      dockerfile: infra/ffmpeg/Dockerfile
    entrypoint: ["/bin/sh", "/usr/local/bin/publish-loop"]
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/video.mp4
      - -map
      - 0:v:0
      - -map
      - 0:a:0?
      - -c:v
      - libx264
      - -preset
      - veryfast
      - -tune
      - zerolatency
      - -profile:v
      - main
      - -pix_fmt
      - yuv420p
      - -g
      - "48"
      - -keyint_min
      - "48"
      - -bf
      - "0"
      - -c:a
      - aac
      - -ac
      - "2"
      - -ar
      - "48000"
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx-simulator:18554/vcam1
    depends_on:
      mediamtx-simulator:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./public/videos:/videos:ro
      - ./infra/ffmpeg/publish-loop.sh:/usr/local/bin/publish-loop:ro

  simulator-vcam2:
    build:
      context: .
      dockerfile: infra/ffmpeg/Dockerfile
    entrypoint: ["/bin/sh", "/usr/local/bin/publish-loop"]
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/output.mp4
      - -map
      - 0:v:0
      - -map
      - 0:a:0?
      - -c:v
      - libx264
      - -preset
      - veryfast
      - -tune
      - zerolatency
      - -profile:v
      - main
      - -pix_fmt
      - yuv420p
      - -g
      - "48"
      - -keyint_min
      - "48"
      - -bf
      - "0"
      - -c:a
      - aac
      - -ac
      - "2"
      - -ar
      - "48000"
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx-simulator:18554/vcam2
    depends_on:
      mediamtx-simulator:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./public/videos:/videos:ro
      - ./infra/ffmpeg/publish-loop.sh:/usr/local/bin/publish-loop:ro

  mediamtx-vms:
    image: bluenviron/mediamtx:1.19.1
    restart: unless-stopped
    depends_on:
      mediamtx-simulator:
        condition: service_started
    volumes:
      - ./infra/mediamtx/vms.yml:/mediamtx.yml:ro
      - recordings:/recordings
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"
      - "9996:9996"
      - "9997:9997"

  app:
    build: .
    environment:
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET}
      ALARM_INGEST_TOKEN: ${ALARM_INGEST_TOKEN:?Set ALARM_INGEST_TOKEN}
      MEDIAMTX_API_URL: http://mediamtx-vms:9997
      MEDIAMTX_PLAYBACK_URL: http://mediamtx-vms:9996
      TAMPER_RTSP_BASE_URL: rtsp://mediamtx-vms:8554
      REALTIME_INTERNAL_URL: http://realtime:3001
      NEXT_PUBLIC_MEDIAMTX_API_URL: http://localhost:9997
      NEXT_PUBLIC_MEDIAMTX_HLS_URL: http://localhost:8888
      NEXT_PUBLIC_MEDIAMTX_WEBRTC_URL: http://localhost:8889
      NEXT_PUBLIC_MEDIAMTX_PLAYBACK_URL: http://localhost:9996
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
      RECORDINGS_PATH: /recordings
    depends_on:
      mediamtx-vms:
        condition: service_started
      realtime:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - recordings:/recordings

  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      SOCKET_CORS_ORIGIN: "*"
    ports:
      - "3001:3001"

  monitor:
    build:
      context: .
      target: builder
    command: ["npm", "run", "monitor"]
    environment:
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET}
      MEDIAMTX_API_URL: http://mediamtx-vms:9997
      NEXT_PUBLIC_MEDIAMTX_API_URL: http://localhost:9997
      NEXT_PUBLIC_MEDIAMTX_HLS_URL: http://localhost:8888
      NEXT_PUBLIC_MEDIAMTX_WEBRTC_URL: http://localhost:8889
    depends_on:
      mediamtx-vms:
        condition: service_started

  tamper-detection:
    build:
      context: .
      dockerfile: tamper-detection/Dockerfile
    restart: unless-stopped
    environment:
      APP_BASE_URL: http://app:3000
      ALARM_INGEST_TOKEN: ${ALARM_INGEST_TOKEN:?Set ALARM_INGEST_TOKEN}
      TAMPER_SCREENSHOT_DIR: /tamper-screenshots
      TAMPER_CAMERA_POLL_SECONDS: 10
      TAMPER_FRAME_INTERVAL_SECONDS: 1
      TAMPER_CONSECUTIVE_FRAMES: 1
      TAMPER_COOLDOWN_SECONDS: 30
    depends_on:
      app:
        condition: service_started
      mediamtx-vms:
        condition: service_started
    volumes:
      - tamper_screenshots:/tamper-screenshots

volumes:
  recordings:
  tamper_screenshots:
